---
- name: Install Nginx
  apt:
    name: nginx
    state: present

- name: Create Nginx default configuration with stub_status enabled
  copy:
    content: |
      server {
          listen 80 default_server;
          listen [::]:80 default_server;

          root /var/www/html;
          index index.html index.htm;

          server_name _;

          location / {
              try_files $uri $uri/ =404;
          }

          location /nginx_status {
              stub_status on;
              allow 127.0.0.1;
              allow 10.0.0.0/16; # Allow VPC internal queries
              deny all;
          }
      }
    dest: /etc/nginx/sites-available/default
  notify: Restart Nginx

- name: Start and enable Nginx service
  systemd:
    name: nginx
    state: started
    enabled: yes

# Handler for restarting nginx
- name: Flush handlers to apply config changes
  meta: flush_handlers
